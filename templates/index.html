<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appels Offres BF 🇧🇫</title>
  <style>
    /* ── Reset & variables ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rouge:   #ef2b2d;
      --vert:    #009a44;
      --jaune:   #fcd116;
      --noir:    #111827;
      --gris1:   #f3f4f6;
      --gris2:   #e5e7eb;
      --gris3:   #9ca3af;
      --texte:   #1f2937;
      --blanc:   #ffffff;
      --ombre:   0 1px 4px rgba(0,0,0,.10);
      --ombre-lg:0 4px 20px rgba(0,0,0,.12);
      --radius:  10px;
      --trans:   .18s ease;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--gris1);
      color: var(--texte);
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, var(--rouge) 0%, #c0392b 100%);
      color: var(--blanc);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-flag { font-size: 1.8rem; line-height: 1; }
    .logo-title {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -.3px;
    }
    .logo-sub {
      font-size: .75rem;
      opacity: .85;
      font-weight: 400;
    }
    .header-badge {
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.35);
      color: var(--blanc);
      font-size: .75rem;
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* ── Bandeau stats ─────────────────────────────────────────────── */
    .stats-bar {
      background: var(--blanc);
      border-bottom: 3px solid var(--jaune);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 56px;
      overflow-x: auto;
      box-shadow: var(--ombre);
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .stat-num {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--rouge);
    }
    .stat-label {
      font-size: .8rem;
      color: var(--gris3);
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .stat-sep {
      width: 1px;
      height: 28px;
      background: var(--gris2);
      flex-shrink: 0;
    }
    .source-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--gris1);
      border: 1px solid var(--gris2);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: .78rem;
      font-weight: 600;
    }
    .source-pill .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }
    .dot-lesaffairesbf { background: var(--vert); }
    .dot-arcop         { background: var(--rouge); }

    /* ── Conteneur principal ───────────────────────────────────────── */
    main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

    /* ── Barre de recherche + filtres ──────────────────────────────── */
    .toolbar {
      background: var(--blanc);
      border-radius: var(--radius);
      box-shadow: var(--ombre);
      padding: 16px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
    }
    .search-wrap {
      flex: 1;
      min-width: 220px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gris3);
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      padding: 10px 14px 10px 40px;
      border: 1.5px solid var(--gris2);
      border-radius: 8px;
      font-size: .95rem;
      outline: none;
      transition: border-color var(--trans);
      background: var(--gris1);
    }
    .search-wrap input:focus {
      border-color: var(--rouge);
      background: var(--blanc);
    }
    select {
      padding: 10px 14px;
      border: 1.5px solid var(--gris2);
      border-radius: 8px;
      font-size: .9rem;
      background: var(--gris1);
      outline: none;
      cursor: pointer;
      transition: border-color var(--trans);
      min-width: 160px;
    }
    select:focus { border-color: var(--rouge); background: var(--blanc); }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all var(--trans);
    }
    .btn-primary {
      background: var(--rouge);
      color: var(--blanc);
    }
    .btn-primary:hover { background: #c0392b; }
    .btn-ghost {
      background: var(--gris1);
      color: var(--gris3);
      border: 1.5px solid var(--gris2);
    }
    .btn-ghost:hover { color: var(--texte); border-color: var(--gris3); }

    /* ── Résumé résultats ──────────────────────────────────────────── */
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .results-count {
      font-size: .9rem;
      color: var(--gris3);
    }
    .results-count strong { color: var(--texte); }

    /* ── Grille de cartes ──────────────────────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--blanc);
      border-radius: var(--radius);
      box-shadow: var(--ombre);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: box-shadow var(--trans), transform var(--trans);
      border-top: 3px solid transparent;
    }
    .card:hover {
      box-shadow: var(--ombre-lg);
      transform: translateY(-2px);
    }
    .card.source-lesaffairesbf { border-top-color: var(--vert); }
    .card.source-arcop         { border-top-color: var(--rouge); }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .card-source {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-source.source-lesaffairesbf {
      background: #ecfdf5;
      color: #065f46;
    }
    .card-source.source-arcop {
      background: #fef2f2;
      color: #991b1b;
    }
    .card-statut {
      font-size: .7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .statut-ouvert  { background: #dcfce7; color: #166534; }
    .statut-clos    { background: #f3f4f6; color: #6b7280; }
    .statut-annule  { background: #fee2e2; color: #991b1b; }

    .card-titre {
      font-size: .95rem;
      font-weight: 600;
      color: var(--noir);
      line-height: 1.45;
      flex: 1;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: .8rem;
      color: var(--gris3);
    }
    .meta-item svg { flex-shrink: 0; }
    .meta-item.alerte { color: #b45309; }

    .card-footer {
      display: flex;
      justify-content: flex-end;
      padding-top: 4px;
      border-top: 1px solid var(--gris2);
      margin-top: auto;
    }
    .btn-offre {
      font-size: .82rem;
      padding: 7px 14px;
      background: var(--rouge);
      color: var(--blanc);
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      transition: background var(--trans);
      border: none;
      cursor: pointer;
    }
    .btn-offre:hover { background: #c0392b; }
    .btn-offre:visited { color: var(--blanc); }

    /* ── États vides / chargement / erreur ─────────────────────────── */
    .state-box {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--gris3);
    }
    .state-box .icon { font-size: 3rem; margin-bottom: 12px; }
    .state-box p { font-size: .95rem; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--gris2);
      border-top-color: var(--rouge);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Pagination ────────────────────────────────────────────────── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-top: 32px;
      flex-wrap: wrap;
    }
    .page-btn {
      min-width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1.5px solid var(--gris2);
      background: var(--blanc);
      color: var(--texte);
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--trans);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
    }
    .page-btn:hover:not(:disabled) {
      border-color: var(--rouge);
      color: var(--rouge);
    }
    .page-btn.active {
      background: var(--rouge);
      border-color: var(--rouge);
      color: var(--blanc);
    }
    .page-btn:disabled { opacity: .35; cursor: not-allowed; }
    .page-ellipsis {
      color: var(--gris3);
      font-size: .9rem;
      padding: 0 4px;
    }

    /* ── Responsive ────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .logo-sub { display: none; }
      .stats-bar { gap: 20px; }
      .stat-num { font-size: 1.1rem; }
      main { padding: 16px 12px 48px; }
      .toolbar { padding: 14px; }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <span class="logo-flag">🇧🇫</span>
    <div>
      <div class="logo-title">Appels Offres BF</div>
      <div class="logo-sub">Agrégation des marchés publics &amp; privés</div>
    </div>
  </div>
  <span class="header-badge" id="badge-total">Chargement…</span>
</header>

<!-- ── Bandeau stats ──────────────────────────────────────────────────── -->
<div class="stats-bar">
  <div class="stat-item">
    <span class="stat-num" id="stat-total">—</span>
    <span class="stat-label">Offres totales</span>
  </div>
  <div class="stat-sep"></div>
  <div class="stat-item">
    <span class="source-pill">
      <span class="dot dot-lesaffairesbf"></span>
      lesaffairesbf
    </span>
    <span class="stat-num" id="stat-lesaffaires" style="font-size:1.05rem">—</span>
  </div>
  <div class="stat-sep"></div>
  <div class="stat-item">
    <span class="source-pill">
      <span class="dot dot-arcop"></span>
      arcop
    </span>
    <span class="stat-num" id="stat-arcop" style="font-size:1.05rem">—</span>
  </div>
  <div class="stat-sep"></div>
  <div class="stat-item">
    <span class="stat-label">Dernière MàJ :</span>
    <span style="font-size:.85rem;font-weight:600;" id="stat-maj">—</span>
  </div>
</div>

<!-- ── Contenu principal ──────────────────────────────────────────────── -->
<main>

  <!-- Toolbar -->
  <div class="toolbar">
    <!-- Recherche -->
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="input-search"
             placeholder="Rechercher un appel d'offres…"
             autocomplete="off" />
    </div>

    <!-- Filtre source -->
    <select id="filter-source">
      <option value="">Toutes les sources</option>
      <option value="lesaffairesbf">lesaffairesbf.com</option>
      <option value="arcop">arcop.bf</option>
    </select>

    <!-- Filtre statut -->
    <select id="filter-statut">
      <option value="">Tous les statuts</option>
      <option value="ouvert">Ouvert</option>
      <option value="clos">Clos</option>
      <option value="annule">Annulé</option>
    </select>

    <!-- Actions -->
    <button class="btn btn-primary" onclick="lancerRecherche()">Rechercher</button>
    <button class="btn btn-ghost" onclick="reinitialiser()">Réinitialiser</button>
  </div>

  <!-- Résumé résultats -->
  <div class="results-header">
    <p class="results-count" id="results-count"></p>
  </div>

  <!-- Grille de cartes -->
  <div class="cards-grid" id="cards-grid">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Chargement des appels d'offres…</p>
    </div>
  </div>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>

</main>

<script>
  const API = window.location.hostname === '127.0.0.1'
    ? 'http://127.0.0.1:8000'
    : '';
  const LIMITE = 12;

  // ── État global ──────────────────────────────────────────────────────
  let etat = {
    page: 1,
    total: 0,
    pages_total: 1,
    recherche: '',
    source: '',
    statut: '',
  };

  // ── Chargement des stats ─────────────────────────────────────────────
  async function chargerStats() {
    try {
      const data = await fetch(`${API}/stats`).then(r => r.json());
      document.getElementById('stat-total').textContent = data.total_offres;
      document.getElementById('badge-total').textContent =
        `${data.total_offres} offres`;
      document.getElementById('stat-lesaffaires').textContent =
        data.par_source.lesaffairesbf ?? 0;
      document.getElementById('stat-arcop').textContent =
        data.par_source.arcop ?? 0;

      const maj = data.derniere_mise_a_jour
        ? new Date(data.derniere_mise_a_jour + 'Z')
            .toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' })
        : '—';
      document.getElementById('stat-maj').textContent = maj;
    } catch {
      document.getElementById('badge-total').textContent = 'API indisponible';
    }
  }

  // ── Chargement des offres ────────────────────────────────────────────
  async function chargerOffres() {
    const grid = document.getElementById('cards-grid');
    grid.innerHTML = '<div class="state-box"><div class="spinner"></div><p>Chargement…</p></div>';
    document.getElementById('pagination').innerHTML = '';

    try {
      let url, data;
      const { page, recherche, source, statut } = etat;

      if (recherche.trim().length >= 2) {
        const params = new URLSearchParams({
          q: recherche.trim(), page, limite: LIMITE,
        });
        data = await fetch(`${API}/offres/search?${params}`).then(r => r.json());
        // harmoniser la clé
        data.offres = data.resultats ?? [];
      } else {
        const params = new URLSearchParams({ page, limite: LIMITE });
        if (source) params.set('source', source);
        if (statut) params.set('statut', statut);
        data = await fetch(`${API}/offres?${params}`).then(r => r.json());
      }

      etat.total = data.total;
      etat.pages_total = data.pages_total;

      afficherCount(data.total, recherche);
      afficherCartes(data.offres ?? []);
      afficherPagination(page, data.pages_total);

    } catch (err) {
      grid.innerHTML = `
        <div class="state-box">
          <div class="icon">⚠️</div>
          <p>Impossible de joindre l'API.<br>
             Vérifiez que le serveur tourne sur <code>${API}</code></p>
        </div>`;
    }
  }

  // ── Affichage du compteur ────────────────────────────────────────────
  function afficherCount(total, q) {
    const el = document.getElementById('results-count');
    if (q && q.length >= 2)
      el.innerHTML = `<strong>${total}</strong> résultat${total !== 1 ? 's' : ''} pour « ${echapper(q)} »`;
    else
      el.innerHTML = `<strong>${total}</strong> offre${total !== 1 ? 's' : ''} trouvée${total !== 1 ? 's' : ''}`;
  }

  // ── Rendu d'une carte ────────────────────────────────────────────────
  function afficherCartes(offres) {
    const grid = document.getElementById('cards-grid');
    if (!offres.length) {
      grid.innerHTML = `
        <div class="state-box">
          <div class="icon">🔍</div>
          <p>Aucun appel d'offres trouvé.</p>
        </div>`;
      return;
    }

    grid.innerHTML = offres.map(o => {
      const sourceCls  = 'source-' + (o.source || 'autre');
      const statutCls  = 'statut-' + (o.statut || 'ouvert');
      const statutLbl  = { ouvert:'Ouvert', clos:'Clos', annule:'Annulé' }[o.statut] ?? o.statut;
      const sourceLbl  = { lesaffairesbf:'lesaffairesbf.com', arcop:'arcop.bf' }[o.source] ?? o.source;

      const datePub = o.date_publication
        ? `<div class="meta-item">
             <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
               <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
               <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
             </svg>
             Publiée le ${echapper(o.date_publication)}
           </div>` : '';

      const dateLimite = o.date_limite
        ? `<div class="meta-item alerte">
             <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
               <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
               <line x1="12" y1="16" x2="12.01" y2="16"/>
             </svg>
             Clôture : ${echapper(o.date_limite)}
           </div>` : '';

      return `
        <div class="card ${sourceCls}">
          <div class="card-header">
            <span class="card-source ${sourceCls}">${echapper(sourceLbl)}</span>
            <span class="card-statut ${statutCls}">${statutLbl}</span>
          </div>
          <div class="card-titre">${echapper(o.titre || '—')}</div>
          <div class="card-meta">
            ${datePub}
            ${dateLimite}
          </div>
          <div class="card-footer">
            <a class="btn-offre"
               href="${echapper(o.url_source || '#')}"
               target="_blank" rel="noopener noreferrer">
              Voir l'offre ↗
            </a>
          </div>
        </div>`;
    }).join('');
  }

  // ── Pagination ───────────────────────────────────────────────────────
  function afficherPagination(page, total) {
    const el = document.getElementById('pagination');
    if (total <= 1) { el.innerHTML = ''; return; }

    const pages = pagesToAfficher(page, total);
    let html = '';

    html += `<button class="page-btn" onclick="allerPage(${page - 1})"
              ${page <= 1 ? 'disabled' : ''}>‹</button>`;

    let prev = null;
    for (const p of pages) {
      if (prev !== null && p - prev > 1)
        html += `<span class="page-ellipsis">…</span>`;
      html += `<button class="page-btn ${p === page ? 'active' : ''}"
                onclick="allerPage(${p})">${p}</button>`;
      prev = p;
    }

    html += `<button class="page-btn" onclick="allerPage(${page + 1})"
              ${page >= total ? 'disabled' : ''}>›</button>`;

    el.innerHTML = html;
  }

  function pagesToAfficher(current, total) {
    const pages = new Set([1, total]);
    for (let i = Math.max(1, current - 2); i <= Math.min(total, current + 2); i++)
      pages.add(i);
    return [...pages].sort((a, b) => a - b);
  }

  // ── Actions ──────────────────────────────────────────────────────────
  function allerPage(p) {
    if (p < 1 || p > etat.pages_total) return;
    etat.page = p;
    chargerOffres();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function lancerRecherche() {
    etat.page = 1;
    etat.recherche = document.getElementById('input-search').value;
    etat.source   = document.getElementById('filter-source').value;
    etat.statut   = document.getElementById('filter-statut').value;
    chargerOffres();
  }

  function reinitialiser() {
    document.getElementById('input-search').value = '';
    document.getElementById('filter-source').value = '';
    document.getElementById('filter-statut').value = '';
    etat = { page:1, total:0, pages_total:1, recherche:'', source:'', statut:'' };
    chargerOffres();
  }

  // ── Sécurité : échapper le HTML ──────────────────────────────────────
  function echapper(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Raccourcis clavier ───────────────────────────────────────────────
  document.getElementById('input-search').addEventListener('keydown', e => {
    if (e.key === 'Enter') lancerRecherche();
  });
  document.getElementById('filter-source').addEventListener('change', lancerRecherche);
  document.getElementById('filter-statut').addEventListener('change', lancerRecherche);

  // ── Initialisation ───────────────────────────────────────────────────
  chargerStats();
  chargerOffres();
</script>
</body>
</html>
