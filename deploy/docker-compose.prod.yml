# NetSync Gov — Docker Compose Production (Hostinger VPS)
# Usage : docker-compose -f docker-compose.prod.yml up -d

services:

  # ── Base de données PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: netsync_db
    environment:
      POSTGRES_DB:       netsync_gov
      POSTGRES_USER:     netsync
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netsync -d netsync_gov"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - netsync_net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: netsync_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - netsync_net

  # ── API FastAPI ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: netsync_api
    environment:
      DATABASE_URL:         postgresql://netsync:${DB_PASSWORD}@db:5432/netsync_gov
      REDIS_URL:            redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET_KEY:       ${JWT_SECRET_KEY}
      RESEND_API_KEY:       ${RESEND_API_KEY}
      RESEND_FROM_EMAIL:    alertes@gov.netsync.bf
      WHATSAPP_API_TOKEN:   ${WHATSAPP_API_TOKEN}
      WHATSAPP_PHONE_ID:    ${WHATSAPP_PHONE_ID}
      WHATSAPP_WABA_ID:     ${WHATSAPP_WABA_ID}
      ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY}
      CINETPAY_SITE_ID:     ${CINETPAY_SITE_ID}
      CINETPAY_API_KEY:     ${CINETPAY_API_KEY}
      CINETPAY_SECRET_KEY:  ${CINETPAY_SECRET_KEY}
      CINETPAY_NOTIFY_URL:  https://api.gov.netsync.bf/api/v1/paiements/webhook
      CINETPAY_RETURN_URL:  https://gov.netsync.bf/paiement/succes
      PDF_STORAGE_DIR:      /data/pdfs
      ADMIN_EMAILS:         ${ADMIN_EMAIL}
      ENVIRONMENT:          production
    volumes:
      - pdf_data:/data/pdfs
      - log_data:/data/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - netsync_net

  # ── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: netsync_worker
    command: celery -A pipeline.celery_app worker --loglevel=info --concurrency=2 -Q default
    environment:
      DATABASE_URL:        postgresql://netsync:${DB_PASSWORD}@db:5432/netsync_gov
      REDIS_URL:           redis://:${REDIS_PASSWORD}@redis:6379/0
      RESEND_API_KEY:      ${RESEND_API_KEY}
      WHATSAPP_API_TOKEN:  ${WHATSAPP_API_TOKEN}
      WHATSAPP_PHONE_ID:   ${WHATSAPP_PHONE_ID}
      ANTHROPIC_API_KEY:   ${ANTHROPIC_API_KEY}
      CINETPAY_API_KEY:    ${CINETPAY_API_KEY}
      CINETPAY_SECRET_KEY: ${CINETPAY_SECRET_KEY}
      PDF_STORAGE_DIR:     /data/pdfs
    volumes:
      - pdf_data:/data/pdfs
      - log_data:/data/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - netsync_net

  # ── Celery Beat (scheduler) ──────────────────────────────────────────────────
  beat:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: netsync_beat
    command: celery -A pipeline.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    environment:
      DATABASE_URL: postgresql://netsync:${DB_PASSWORD}@db:5432/netsync_gov
      REDIS_URL:    redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - beat_data:/app/celerybeat-schedule
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - netsync_net

  # ── Frontend Vue.js ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
    container_name: netsync_frontend
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - netsync_net

  # ── Nginx reverse proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: netsync_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/gov.netsync.bf.conf:/etc/nginx/conf.d/gov.netsync.bf.conf:ro
      - ssl_certs:/etc/letsencrypt:ro
      - ssl_www:/var/www/certbot:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    networks:
      - netsync_net

  # ── Certbot (SSL Let's Encrypt) ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: netsync_certbot
    volumes:
      - ssl_certs:/etc/letsencrypt
      - ssl_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  pdf_data:
  log_data:
  beat_data:
  ssl_certs:
  ssl_www:

networks:
  netsync_net:
    driver: bridge
