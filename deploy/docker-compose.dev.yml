version: '3.9'

services:

  db:
    image: postgres:15-alpine
    container_name: netsync_db_dev
    environment:
      POSTGRES_USER: netsync
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: netsync_gov_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netsync"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: netsync_redis_dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data_dev:
